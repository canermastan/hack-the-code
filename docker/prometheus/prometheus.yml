global:
  scrape_interval: 5s
  external_labels:
    monitor: 'kodlacoz-monitor'
scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 10s
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8000']
  - job_name: 'node-exporter'
    scrape_interval: 5s
    static_configs:
      - targets: ['node-exporter:9100']