version: '3'

networks:
  kodlacoz-monitoring:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:2.47
    container_name: prometheus
    extra_hosts:
        - host.docker.internal:host-gateway
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - kodlacoz-monitoring
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    networks:
      - kodlacoz-monitoring

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
        - GF_SECURITY_ADMIN_PASSWORD=CanerMastan5821310_kodlacoz
        - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - kodlacoz-monitoring