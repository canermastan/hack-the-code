<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />

    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico"
          th:href="@{/images/logo/favicon.ico}"/>

    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"
    />
    <meta
            name="description"
            content="Algoritma sorularını çözerek kodlama yeteneğini geliştir! Kodla Çöz, algoritmaları öğrenmenin ve pratik yapmanın en iyi yoludur. Kodla Çöz, tamamen Türkçe ve ücretsiz!"
    />
    <meta property="og:title" content="Kodla Çöz | Algoritma Sorusu Çözme Platformu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Kodlacoz.com" />
    <meta name="keywords" content="Algoritma, Algorithm, Kodlama, Code, Coding, Türkçe"/>
    <title>Kodla Çöz | Giriş Yap</title>

    <div th:insert="fragments/cdn-head-auth-imports :: fomantic-head"></div>
  </head>

  <body id="root">
    <div class="ui middle aligned center aligned grid">
      <div class="column">
        <h2 class="ui center aligned header green-color">
          Giriş Yap
        </h2>
        <div th:if="${param.logout}" id="logout-success">
          <div class="ui success message">Çıkış yapıldı!</div>
        </div>
        <div th:if="${param.loginFailed}" id="login-error">
          <div class="ui error message">Giriş başarısız!</div>
        </div>
        <div th:if="${isResetPasswordSuccess}" id="reset-password-success">
          <div class="ui success message">Parola yenilendi.</div>
        </div>
        <div th:if="${isRegisterSuccess}" id="register-success">
          <!--<div class="ui success message">Hesabınızı aktifleştirmek için Emailinize gönderilen aktivasyon linkine tıklayınız.</div>-->
          <div class="ui success message">Hesabınız oluşturuldu. Giriş Yapabilirsiniz.</div>
        </div>

        <form class="ui large form" th:action="@{/login}" method="post">
          <div class="ui stacked segment">
            <div class="field">
              <div class="ui left icon input">
                <i class="user icon"></i>
                <input name="email" placeholder="E-mail adresi" type="text" />
              </div>
            </div>
            <div class="field">
              <div class="ui left icon input">
                <i class="lock icon"></i>
                <input name="password" placeholder="Parola" type="password" />
              </div>
            </div>

            <div class="field">
              <div class="ui left icon input">
                <a th:href="@{/forgot_password}">Parolamı unuttum</a>
              </div>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
           <div class="ui fluid large submit button green" id="submit-button">Giriş Yap</div>
          </div>
          <div class="ui error message"></div>
          <!--<span th:if="${!param.loginFailed.isEmpty()}">
            #strings.toString(param.loginFailed) == 'true'}
            <div class="ui message">Giriş başarısız, kullanıcı adı veya parola yanlış.</div>
          </span>-->
        </form>

        <div class="ui message">Hesabınız yok mu?<a th:href="@{/register}"> Kayıt Ol</a></div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.3.3/semantic.min.js"></script>
    <script>
      $('submit-button').click(function(){
        document.forms[0].submit();
      })

      setTimeout(function(){
        $('#logout-success').remove();
        $('#login-error').remove();
        $('reset-password-success').remove();
        $('register-success').remove();
      }, 5000);
    </script>
    <script>
      $(document).ready(function() {
        $(".ui.form").form({
          fields: {
            email: {
              identifier: "email",
              rules: [
                {
                  type: "empty",
                  prompt: "Lütfen e-mail adresinizi giriniz"
                }
              ]
            },
            password: {
              identifier: "password",
              rules: [
                {
                  type: "empty",
                  prompt: "Lütfen parolanızı giriniz"
                },
                {
                  type: "length[6]",
                  prompt: "Parolanız en az 6 karakterli olmalı"
                }
              ]
            }
          }
        });
      });
    </script>
  </body>
</html>
