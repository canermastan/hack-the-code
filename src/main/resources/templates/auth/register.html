<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />

    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico"
          th:href="@{/images/logo/favicon.ico}"/>

    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"
    />
    <meta
            name="description"
            content="Algoritma sorularını çözerek kodlama yeteneğini geliştir! Kodla Çöz, algoritmaları öğrenmenin ve pratik yapmanın en iyi yoludur. Kodla Çöz, tamamen Türkçe ve ücretsiz!"
    />
    <meta property="og:title" content="Kodla Çöz | Algoritma Sorusu Çözme Platformu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Kodlacoz.com" />
    <meta name="keywords" content="Algoritma, Algorithm, Kodlama, Code, Coding, Türkçe"/>
    <title>Kodla Çöz | Kayıt Ol</title>
    <div th:insert="fragments/cdn-head-auth-imports :: fomantic-head"></div>

  </head>

  <body id="root">
    <div class="ui middle aligned center aligned grid">
      <div class="column">
        <h2 class="ui black center aligned header">
          Kayıt ol
        </h2>
        <div th:if="${isRegisterSuccess == false}" id="login-error">
          <div class="ui error message">Kayıt işlemi Başarısız! Email veya Kullanıcı Adı zaten mevcut.</div>
        </div>
        <form class="ui large form" th:action="@{/register}" th:object="${userObj}" method="post">
          <div class="ui stacked segment">
            <div class="field">
              <div class="ui left icon input">
                <i class="user icon"></i>
                <input name="fullName" placeholder="İsim Soyisim" type="text" th:field="*{fullName}"/>
              </div>
            </div>
            <div class="field">
              <div class="ui left icon input">
                <i class="user icon"></i>
                <input name="nickname" placeholder="Kullanıcı Adı" type="text" th:field="*{nickname}"/>
              </div>
            </div>
            <div class="field">
              <div class="ui left icon input">
                <i class="user icon"></i>
                <input name="email" id="email" placeholder="E-mail adresi" type="text" th:field="*{email}"/>
              </div>
            </div>
            <div class="field">
              <div class="ui left icon input">
                <i class="lock icon"></i>
                <input name="password" placeholder="Parola" type="password" th:field="*{password}"/>
              </div>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="ui fluid large green submit button" id="submit-button">Kayıt Ol</div>
          </div>
          <div class="ui error message"></div>
        </form>
        <div class="ui message">Hesabınız var mı?<a th:href="@{/login}"> Giriş Yap</a></div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.3.3/semantic.min.js"></script>

    <script>
      $(document).ready(function() {
        $(".ui.form").form({
          fields: {
            fullName: {
                rules: [
                {
                  type: "empty",
                  prompt: "Lütfen isminizi giriniz"
                },
              ]
            },
            nickname: {
              rules: [
                {
                  type: "empty",
                  prompt: "Lütfen kullanıcı adınızı giriniz"
                },
                {
                  type: "length[6]",
                  prompt: "kullanıcı adınız en az 6 karakterli olmalı"
                }
              ]
            },
            email: {
              identifier: "email",
              rules: [
                {
                  type: "empty",
                  prompt: "Lütfen e-mail adresinizi giriniz"
                }
              ]
            },
            password: {
              identifier: "password",
              rules: [
                {
                  type: "empty",
                  prompt: "Lütfen parolanızı giriniz"
                },
                {
                  type: "length[6]",
                  prompt: "Parolanız en az 6 karakterli olmalı"
                }
              ]
            }
          }
        });
      });

    </script>
    <script>
      $('#submit-button').click(function(){
        if($('.ui.form').form.valid()){
          document.forms[0].submit();
        }
      })
    </script>
  </body>
</html>
