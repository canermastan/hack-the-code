<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />

    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico"
          th:href="@{/images/logo/favicon.ico}"/>

    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"
    />
    <meta
            name="description"
            content="Algoritma sorularını çözerek kodlama yeteneğini geliştir! Kodla Çöz, algoritmaları öğrenmenin ve pratik yapmanın en iyi yoludur. Kodla Çöz, tamamen Türkçe ve ücretsiz!"
    />
    <meta property="og:title" content="Kodla Çöz | Algoritma Sorusu Çözme Platformu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Kodlacoz.com" />
    <meta name="keywords" content="Algoritma, Algorithm, Kodlama, Code, Coding, Türkçe"/>
    <title>Kodla Çöz | Parolayı Yenile</title>
    <div th:insert="fragments/cdn-head-auth-imports :: fomantic-head"></div>
</head>

<body id="root">
<div class="ui middle aligned center aligned grid">
    <div class="column">
        <h2 class="ui black center aligned header">
            Parolayı Yenile
        </h2>
        <div th:if="${isResetPasswordSuccess == false}" id="reset-password-success">
            <div class="ui error message">Token Geçersiz! Lütfen tekrar deneyin.</div>
        </div>
        <form class="ui large form" th:action="@{/reset_password}" method="post">
            <input type="hidden" name="token" th:value="${token}" />
            <div class="ui stacked segment">
                <div class="field">
                    <div class="ui left icon input">
                        <i class="lock icon"></i>
                        <input name="password" placeholder="Yeni parola" type="password" id="password"/>
                    </div>
                </div>
                <div class="field">
                    <div class="ui left icon input">
                        <i class="lock icon"></i>
                        <input placeholder="Parolayı tekrar girin" type="password" required oninput="checkPasswordMatch(this);"/>
                    </div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="ui fluid large green submit button" id="submit-button">Giriş Yap</div>
            </div>
            <div class="ui error message"></div>
        </form>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.3.3/semantic.min.js"></script>
<script>
    $('submit-button').click(function(){
        document.forms[0].submit();
    })
</script>
<script>
    $(document).ready(function() {
        $(".ui.form").form({
            fields: {
                password: {
                    identifier: "password",
                    rules: [
                        {
                            type: "empty",
                            prompt: "Lütfen parolanızı giriniz"
                        },
                        {
                            type: "length[6]",
                            prompt: "Parolanız en az 6 karakterli olmalı"
                        }
                    ]
                }
            }
        });
    });

    function checkPasswordMatch(fieldConfirmPassword) {
        if (fieldConfirmPassword.value != $("#password").val()) {
            fieldConfirmPassword.setCustomValidity("Passwords do not match!");
        } else {
            fieldConfirmPassword.setCustomValidity("");
        }
    }
</script>
</body>
</html>
