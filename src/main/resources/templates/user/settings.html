<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico"
          th:href="@{/images/logo/favicon.ico}"/>

    <title>Ayarlar</title>
    <div th:insert="fragments/cdn-head-dashboard-imports.html :: fomantic-head"></div>

    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"
    />
    <meta
            name="description"
            content="Algoritma sorularını çözerek kodlama yeteneğini geliştir! Kodla Çöz, algoritmaları öğrenmenin ve pratik yapmanın en iyi yoludur. Kodla Çöz, tamamen Türkçe ve ücretsiz!"
    />
    <meta property="og:title" content="Kodla Çöz | Algoritma Sorusu Çözme Platformu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Kodlacoz.com" />
    <meta name="keywords" content="Algoritma, Algorithm, Kodlama, Code, Coding, Türkçe"/>
</head>
<body>
<div th:insert="fragments/navbar.html :: navbar"></div>

<div class="ui grid container">
    <div class="four wide column" style="margin-top: 2px;">
        <div th:insert="fragments/user-left-menu.html :: user-left-menu"></div>
    </div>
    <div class="ui twelve wide column" style="margin-top: 2px">
        <div class="row">
            <h2 class="ui icon header center aligned">
                <i class="settings icon"></i>
                <div class="content">
                    Ayarlar
                </div>
            </h2>
        </div>
        <br>
        <div class="row">
            <h4 class="ui horizontal divider header">
                <i class="user icon"></i>
                Hesap Ayarları
            </h4>
            <!-- PASSWORD -->
            <div th:if="${isChangePasswordSuccess == false}" id="change-password-error">
                <div class="ui error message">Şifre Değiştirme Başarısız! Tekrar Deneyin</div>
            </div>
            <div th:if="${isChangePasswordSuccess == true}" id="change-password-success">
                <div class="ui success message">Şifre Değiştirildi!</div>
            </div>

            <p style="display: inline-block">Şifre: ***********</p>
            <button class="ui green button small" id="change-password">Şifreyi Değiştir</button>

            <!-- PASSWORD MODAL -->
            <div class="ui modal" id="modal-password">
                <i class="close icon"></i>
                <div class="header">
                    Şifreyi Değiştir
                </div>
                <form class="ui large form" th:action="@{/change_password}" method="post">
                    <div class="ui stacked segment">
                        <div class="field">
                            <div class="ui left icon input">
                                <i class="lock icon"></i>
                                <input name="old_password" placeholder="Mevcut Parola" type="password" id="old_password"/>
                            </div>
                        </div>
                        <div class="field">
                            <div class="ui left icon input">
                                <i class="lock icon"></i>
                                <input name="new_password" placeholder="Yeni parola" type="password" id="new_password"/>
                            </div>
                        </div>
                        <div class="field">
                            <div class="ui left icon input">
                                <i class="lock icon"></i>
                                <input placeholder="Parolayı tekrar girin" type="password" id="new_password_confirm" required oninput="checkPasswordMatch(this);"/>
                            </div>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="ui fluid large green submit button" id="submit-button">Şifreyi değiştir</div>
                    </div>
                    <div class="ui error message"></div>
                </form>

                <div class="actions">
                    <div class="ui black deny button">
                        İptal
                    </div>
                </div>
            </div>
            <br>
            <br>
            <p style="display: inline-block; margin-right: 38px">Açıklama: </p>
            <div class="ui left icon input"></div>
            <button class="ui green button small" id="change-biography">Açıklamayı Değiştir</button>
            <!-- BIOGRAPHY MODAL -->
            <div class="ui modal" id="modal-biography">
                <i class="close icon"></i>
                <div class="header">
                    Açıklamayı Güncelle
                </div>
                <form class="ui large form" th:action="@{/change-biography}" method="post">
                    <div class="ui stacked segment">
                        <div class="field">
                            <div class="ui left icon input">
                                <textarea name="biography" placeholder="Açıklama"></textarea>
                            </div>
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="ui fluid large green submit button" id="submit-biography">Açıklamayı güncelle</div>
                    </div>
                    <div class="ui error message"></div>
                </form>
                <div class="actions">
                    <div class="ui black deny button">
                        İptal
                    </div>
                </div>
            </div>
            <br>
            <br>
            <p style="display: inline-block; margin-right: 22px">Profil Resmi: </p>
            <button class="ui green button small" id="change-profile-picture" th:if="${user.verificationCode == null}">Profil Resmini Değiştir</button>
            <button class="ui green button small" th:if="${user.verificationCode != null}" disabled>Email adresinizi onaylayın</button>
            <!-- CHANGE PROFILE PICTURE MODAL -->
            <div class="ui modal" id="modal-change-profile-picture">
                <i class="close icon"></i>
                <div class="header">
                    Profil Resmini Değiştir
                </div>
                <form class="ui large form" th:action="@{/change-profile-picture}" method="post" enctype="multipart/form-data" th:if="${user.verificationCode == null}">
                    <div class="ui stacked segment">
                        <div class="field">
                            <input type="file" name="image" accept="image/png, image/jpeg" />
                        </div>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="ui fluid large green submit button" id="submit-profile-picture">Profil Resmini Değiştir</div>
                    </div>
                    <div class="ui error message"></div>
                </form>
                <div class="actions">
                    <div class="ui black deny button">
                        İptal
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:insert="fragments/cdn-js-imports.html :: fomantic-js"></div>
<script>
    // active effect
    $("#settings").addClass("active")

    setTimeout(function(){
        $('#change-password-error').remove();
        $('#change-password-success').remove();
    }, 5000);

    // MODALS
    $("#change-password").click(function () {
        $("#modal-password").modal("show");
    });

    $("#change-profile-picture").click(function () {
        $("#modal-change-profile-picture").modal("show");
    });

    $('#change-biography').click(function(){
        $('#modal-biography').modal('show');
    })

    // SUBMIT BUTTONS
    $('submit-button').click(function(){
        // TODO parola eşleştirme kontrolü çalışmıyor
        if($('#new_password').val() !== $('#new_password_confirm').val()){
            $('#new_password_confirm').attr('placeholder', 'Parolalar eşleşmiyor!');
            return false;
        }
        document.forms[1].submit();
    })
    $('submit-biography').click(function(){
        document.forms[2].submit();
    })

    function checkPasswordMatch(fieldConfirmPassword) {
        if (fieldConfirmPassword.value != $("#new_password").val()) {
            fieldConfirmPassword.setCustomValidity("Passwords do not match!");
        } else {
            fieldConfirmPassword.setCustomValidity("");
        }
    }
    $(document).ready(function () {
        $('.ui.form')
            .form({
                fields: {
                    old_password: {
                        identifier: 'old_password',
                        rules: [
                            {
                                type   : 'empty',
                                prompt : 'Lütfen şifreyi giriniz'
                            },
                            {
                                type   : 'minLength[6]',
                                prompt : 'Şifreniz en az 6 karakterden oluşmalıdır'
                            }
                        ]
                    },
                    new_password: {
                        identifier: 'new_password',
                        rules: [
                            {
                                type   : 'empty',
                                prompt : 'Lütfen şifreyi giriniz'
                            },
                            {
                                type   : 'minLength[6]',
                                prompt : 'Şifreniz en az 6 karakterden oluşmalıdır'
                            }
                        ]
                    },
                }
            })
        ;
    })

</script>

</body>
</html>
