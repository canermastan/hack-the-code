<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico"
          th:href="@{/images/logo/favicon.ico}"/>

    <title>Kodla Çöz | Algoritma</title>
    <div th:insert="fragments/cdn-head-dashboard-imports.html :: fomantic-head"></div>

    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"
    />
    <meta
            name="description"
            content="Algoritma sorularını çözerek kodlama yeteneğini geliştir! Kodla Çöz, algoritmaları öğrenmenin ve pratik yapmanın en iyi yoludur. Kodla Çöz, tamamen Türkçe ve ücretsiz!"
    />
    <meta property="og:title" content="Kodla Çöz | Algoritma Sorusu Çözme Platformu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Kodlacoz.com" />
    <meta name="keywords" content="Algoritma, Algorithm, Kodlama, Code, Coding, Türkçe"/>
</head>
<body>
<div th:insert="fragments/navbar.html :: navbar"></div>
<div class="ui grid">
    <div class="one wide column"></div>
    <div class="ui fourteen wide column" style="margin-top: 5px">
        <div class="row">
            <h2 class="ui header">
                <img class="ui image" src="https://fomantic-ui.com/images/icons/school.png">
                <div class="content" th:text="${language} + ' Algoritma Soruları'">
                    Genel Algoritma Görevleri
                </div>
            </h2>
        </div>
        <br>
    </div>
    <div class="one wide column"></div>
    <div class="one wide column"></div>
    <div class="ui ten wide column">
        <div class="row">
            <table class="ui teal table">
                <thead>
                <tr>
                    <th><span style="font-size: 17px">Görev</span></th>
                    <th>Zorluk</th>
                    <th>Başarı Yüzdesi</th>
                    <th>Puan</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="task : ${tasks}">
                    <td th:text="${task.getTitle()}"><span style="font-size: 16px">Görev</span></td>
                    <td th:text="${task.getDifficulty()}">Zorluk</td>
                    <td th:text="'%' + ${task.getSuccessRate()}">Başarı Yüzdesi</td>
                    <td th:text="${task.getScore()}">Puan</td>
                    <td>
                        <a th:href="@{/task/{id}(id=${task.getId()}, language=${languageId == 1 ? languageId + 1 : languageId})} "> <!-- Genel algoritma sorularında dil menüsünün aktif olması için +1 ekleniyor -->
                            <button class="ui inverted fluid green button">Başla</button>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="ui two wide column">
        <div class="ui form">
            <form th:action="@{|/algorithm/${languageId}|}" th:object="${filter}" method="post">
                <!-- STATUS -->
                <h5 class="ui grey header">Status</h5>
                <div class="inline field">
                    <div class="ui checkbox">
                        <input type="checkbox" tabindex="0" class="hidden" value="true" th:field="*{solved}">
                        <label>Çözüldü</label>
                    </div>
                </div>
                <div class="inline field">
                    <div class="ui checkbox">
                        <input type="checkbox" tabindex="0" class="hidden" value="false" th:field="*{solved}">
                        <label>Çözülmedi</label>
                    </div>
                </div>
                <!-- ZORLUK -->
                <h5 class="ui grey header">Zorluk</h5>
                <div class="inline field">
                    <div class="ui checkbox">
                        <input type="checkbox" tabindex="0" class="hidden" value="Kolay" th:field="*{difficulty}">
                        <label>Kolay</label>
                    </div>
                </div>
                <div class="inline field">
                    <div class="ui checkbox">
                        <input type="checkbox" tabindex="0" class="hidden" value="Orta" th:field="*{difficulty}">
                        <label>Orta</label>
                    </div>
                </div>
                <div class="inline field">
                    <div class="ui checkbox">
                        <input type="checkbox" tabindex="0" class="hidden" value="Zor" th:field="*{difficulty}">
                        <label>Zor</label>
                    </div>
                </div>
                <button type="submit" class="ui primary button small" style="margin-top: 5px">Filtrele</button>
            </form>
        </div>
    </div>
</div>

<div th:insert="fragments/cdn-js-imports.html :: fomantic-js"></div>
<script>
    $('.ui.checkbox').checkbox();
    /*<![CDATA[*/
    var url = "[[${#httpServletRequest.getRequestURL()}]]";

    $("#submit").click(function() {
        var allVals = new Array();
        $("input:checkbox[name=filter]:checked").each(function () {
            allVals.push($(this).val());
            console.log(allVals);

            $.ajax({
                url: url,
                data: {
                    filter: allVals
                },
                type: "GET",
                dataType: "json",
            })
                .done(function (json) {
                    console.log(json);

                });
        });
    });
    /*]]>*/

</script>
</body>
</html>
