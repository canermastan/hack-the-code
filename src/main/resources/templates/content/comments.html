<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico"
          th:href="@{/images/logo/favicon.ico}"/>

    <title>Kodla Çöz | Algoritma</title>
    <div th:insert="fragments/cdn-head-dashboard-imports.html :: fomantic-head"></div>

    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"
    />
    <meta
            name="description"
            content="Algoritma sorularını çözerek kodlama yeteneğini geliştir! Kodla Çöz, algoritmaları öğrenmenin ve pratik yapmanın en iyi yoludur. Kodla Çöz, tamamen Türkçe ve ücretsiz!"
    />
    <meta property="og:title" content="Kodla Çöz | Algoritma Sorusu Çözme Platformu" />
    <meta property="og:locale" content="tr_TR" />
    <meta property="og:site_name" content="Kodlacoz.com" />
    <meta name="keywords" content="Algoritma, Algorithm, Kodlama, Code, Coding, Türkçe"/>
</head>
<body>
<div th:insert="fragments/navbar.html :: navbar"></div>
<div class="ui grid">
    <div class="one wide column"></div>
    <div class="ui fourteen wide column" style="margin-top: 5px">
        <div class="row">
            <h2 class="ui header">
                <!--<img class="ui image" src="https://fomantic-ui.com/images/icons/school.png">-->
                <i class="comments outline icon"></i>
                <div class="content">
                    Tartışma
                </div>
            </h2>
        </div>
        <br>
    </div>
    <div class="one wide column"></div>
    <div class="one wide column"></div>
    <div class="ui ten wide column">
        <div class="row">
            <div class="ui comments">
                <h3 class="ui dividing header">Yorumlar</h3>

                <div class="comment" th:each="comment : ${comments}">
                    <a class="avatar">
                        <img src="https://fomantic-ui.com/images/avatar/small/matt.jpg">
                    </a>
                    <div class="content">
                        <a class="author" th:text="${comment.nickname}" th:href="@{|/profile/${comment.userId}|}">Nickname</a>
                        <div class="metadata">
                            <span class="date" th:text="${#dates.format(comment.createdDate, 'HH:mm - dd/MM/yyyy')}">Today at 5:42PM</span>
                        </div>
                        <div class="text" th:text="${comment.body}">
                            Empty
                        </div>
                        <div th:if="${comment.nickname.equals(user.nickname)}">
                            <div class="actions">
                                <a class="reply delete-button" th:attr="onclick=|deleteCommentModal('${comment.id}')|" >Sil</a>
                            </div>
                        </div>
                        <!-- MODAL -->
                        <div class="ui modal" th:id="${'delete-modal-' + comment.id}">
                            <div class="ui icon header">
                                <i class="archive icon"></i>
                                Mesajı Sil
                            </div>
                            <div class="content">
                                <p>Mesajı silmek istediğinize emin misiniz?</p>
                            </div>
                            <div class="actions">
                                <div class="ui red basic cancel button">
                                    <div><i class="remove icon"></i>
                                        Hayır
                                    </div>
                                </div>
                                <div class="ui green ok button" th:attr="onclick=|deleteComment('${comment.id}')|" >
                                    <form th:action="@{|/task/${taskId}/comment/${comment.id}|}" method="POST"
                                          th:id="${'delete-form-' + comment.id}"><i class="checkmark icon"></i>
                                        Evet
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <form class="ui reply form" th:action="@{|/task/${taskId}/add-comment|}" th:object="${comment}"
                      method="POST" id="submit-form">
                    <div class="field">
                        <textarea th:field="*{body}"></textarea>
                    </div>
                    <div class="ui blue labeled submit icon button" id="submit-comment">
                        <i class="icon edit"></i> Yorum Ekle
                    </div>
                </form>
            </div>
            <div class="ui centered pagination menu">
                <span th:each="i : ${#numbers.sequence(1, totalPages)}">
                    <a class="active item" th:if="${i != 0}" th:text="${i}"
                       th:href="@{|/task/${taskId}/comments/${i - 1}|}"></a>
                </span>
            </div>
        </div>
    </div>

    <div class="ui two wide column">
        <!--<div class="ui form">
            STATUS
            <h5 class="ui grey header">Status</h5>
            <div class="inline field">
                <div class="ui checkbox">
                    <input type="checkbox" tabindex="0" class="hidden">
                    <label>Çözüldü</label>
                </div>
            </div>
            <div class="inline field">
                <div class="ui checkbox">
                    <input type="checkbox" tabindex="0" class="hidden">
                    <label>Çözülmedi</label>
                </div>
            </div>
           ZORLUK
            <h5 class="ui grey header">Zorluk</h5>
            <div class="inline field">
                <div class="ui checkbox">
                    <input type="checkbox" tabindex="0" class="hidden">
                    <label>Kolay</label>
                </div>
            </div>
            <div class="inline field">
                <div class="ui checkbox">
                    <input type="checkbox" tabindex="0" class="hidden">
                    <label>Orta</label>
                </div>
            </div>
            <div class="inline field">
                <div class="ui checkbox">
                    <input type="checkbox" tabindex="0" class="hidden">
                    <label>Zor</label>
                </div>
            </div>
        </div>-->
    </div>
</div>
<div th:insert="fragments/cdn-js-imports.html :: fomantic-js"></div>
<script th:inline="javascript">
    /*<![CDATA[*/
    $('.ui.checkbox').checkbox();

    function deleteCommentModal(commentId){
        $('#delete-modal-' + commentId).modal("show");
    }

    function deleteComment(commentId){
        document.forms['delete-form-' + commentId].submit();
    }


    $('.ui.basic.modal').modal('show');

    $('#submit-comment').click(function () {
        document.forms["submit-form"].submit();
    })
    /*]]>*/
</script>
</body>
</html>
