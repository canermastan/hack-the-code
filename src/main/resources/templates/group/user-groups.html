<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kullanıcı Grupları</title>
    <link rel="icon" type="image/ico" href="../../static/images/logo/favicon.ico" th:href="@{/images/logo/favicon.ico}"/>
    <div th:insert="fragments/cdn-head-dashboard-imports.html :: fomantic-head"></div>
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=2, user-scalable=no"/>
    <meta name="description" content="Kullanıcının katıldığı grupları görüntüleyin ve yeni gruplara katılın"/>
</head>
<body>
<div th:insert="fragments/navbar.html :: navbar"></div>

<div class="ui container" style="margin-top: 20px;">
    <div class="ui grid">
        <!-- Left Column: User's Groups -->
        <div class="sixteen wide column">
            <h2 class="ui header">Katıldığınız Gruplar</h2>
            <table class="ui celled table">
                <thead>
                <tr>
                    <th>Grup Adı</th>
                    <th>Grup Açıklaması</th>
                    <th>Oluşturulma Tarihi</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="group : ${userGroups}">
                    <td><a th:href="@{|/group/${group.id}|}" th:text="${group.name}">Grup Adı</a></td>
                    <td th:text="${group.description}">Grup Açıklaması</td>
                    <td><span th:text="${#dates.format(group.createdDate, 'dd/MM/yyyy')}">Tarih</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="ui segment" style="margin-top: 20px;">
        <div class="ui message" th:if="${errorMessage != null}" th:text="${errorMessage}" style="display: block; background-color: #f8d7da; color: #721c24;"></div>

        <h3 class="ui header">Yeni Bir Gruba Katılın</h3>
        <form th:action="@{/group/join}" method="post" class="ui form">
            <div class="field">
                <label>Katılma Kodu</label>
                <input type="text" name="joinCode" placeholder="Grup Katılma Kodu">
            </div>
            <button type="submit" class="ui button primary">Katıl</button>
        </form>
    </div>
</div>
<div th:insert="fragments/cdn-js-imports.html :: fomantic-js"></div>
</body>
</html>
